name: Test configuration

on:
  pull_request:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  test-configuration:
    name: Test configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install and test configuration
        run: |
          ./install
