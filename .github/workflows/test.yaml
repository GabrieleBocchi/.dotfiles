name: Test configuration

on:
  pull_request:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  test-configuration:
    name: Test configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install and test configuration
        run: |
          ./install
