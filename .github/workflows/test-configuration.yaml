name: Test configuration

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  test-configuration:
    name: ${{ matrix.distro.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        distro:
          - image: alpine:latest
            name: alpine
          - image: fedora:latest
            name: fedora
          - image: ubuntu:latest
            name: ubuntu
    container:
      image: ${{ matrix.distro.image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Test configuration
        run: |
          ./install
