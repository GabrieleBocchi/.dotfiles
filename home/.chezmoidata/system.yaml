# Common packages available on all supported OS
common:
  - alacritty
  - bat
  - fontconfig
  - gcc
  - git
  - make
  - neovim
  - npm
  - tar
  - tmux
  - zsh

fedora:
  copr:
    - atim/lazygit
  dnf:
    - lazygit
    - vim-enhanced

ubuntu:
  apt:
    - lazygit
    - vim

alpine:
  apk:
    - shadow
    - vimdiff
